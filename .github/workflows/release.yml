name: Package Build

on:
  workflow_dispatch:
  release:
    types: [published, created]

permissions:
  contents: write
  
jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate SemVer alignment
        run: |
          python3 scripts/verify_semver.py

      - name: Build zip payload
        run: |
          mkdir -p dist/EDMC-LogEventMiner
          cp ./*.py dist/EDMC-LogEventMiner/
          cp VERSION dist/EDMC-LogEventMiner/
          for dir in */; do
            dir="${dir%/}"
            case "$dir" in
              dist|docs|scripts|tests|__pycache__)
                continue
                ;;
            esac
            if [ -f "$dir/__init__.py" ]; then
              cp -R "$dir" dist/EDMC-LogEventMiner/
            fi
          done
          cd dist
          zip -r EDMC-LogEventMiner.zip EDMC-LogEventMiner

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDMC-LogEventMiner
          path: dist/EDMC-LogEventMiner.zip

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/EDMC-LogEventMiner.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
